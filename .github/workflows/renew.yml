name: auto-renew

on:
  schedule:
    # 每天 UTC 00:00（北京时间 08:00）
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: renew-${{ github.ref }}
  cancel-in-progress: false

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🌐 Install Playwright Chromium (with system deps)
        run: playwright install --with-deps chromium

      - name: ▶️ Run renew
        env:
          WEIRDH0ST_COOKIE_1: ${{ secrets.WEIRDH0ST_COOKIE_1 }}
          WEIRDH0ST_COOKIE_2: ${{ secrets.WEIRDH0ST_COOKIE_2 }}
          WEIRDH0ST_COOKIE_3: ${{ secrets.WEIRDH0ST_COOKIE_3 }}
          WEIRDH0ST_COOKIE_4: ${{ secrets.WEIRDH0ST_COOKIE_4 }}
          WEIRDH0ST_COOKIE_5: ${{ secrets.WEIRDH0ST_COOKIE_5 }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python renew.py
