name: auto-renew

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: renew-${{ github.ref }}
  cancel-in-progress: false

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🌐 Install Google Chrome (stable)
        run: |
          echo "=== 安装 Google Chrome 稳定版 ==="
          # 下载 GPG key（用 --batch --yes 避免 /dev/tty 错误）
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq google-chrome-stable
          google-chrome --version
          # 创建软链接方便脚本查找
          sudo ln -sf $(which google-chrome) /usr/bin/chromium
          sudo ln -sf $(which google-chrome) /usr/bin/chromium-browser

      - name: 🔧 Setup sing-box (if PROXY_NODE configured)
        if: env.PROXY_NODE != ''
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: |
          set -e
          echo "=== 1. 下载 sing-box ==="
          SINGBOX_VERSION=$(curl -fsSL https://api.github.com/repos/SagerNet/sing-box/releases/latest | \
            python3 -c "import sys,json;print(json.load(sys.stdin)['tag_name'])")
          echo "  最新稳定版: $SINGBOX_VERSION"
          
          SINGBOX_URL="https://github.com/SagerNet/sing-box/releases/download/${SINGBOX_VERSION}/sing-box-${SINGBOX_VERSION#v}-linux-amd64.tar.gz"
          echo "  下载: $SINGBOX_URL"
          
          mkdir -p /tmp/sing-box
          curl -fsSL -o /tmp/sing-box.tar.gz "$SINGBOX_URL"
          tar -xzf /tmp/sing-box.tar.gz -C /tmp/sing-box --strip-components=1
          chmod +x /tmp/sing-box/sing-box
          echo "✓ sing-box 已下载: $(/tmp/sing-box/sing-box version | head -1)"

          echo ""
          echo "=== 2. 解析代理协议 + 生成 sing-box 配置 ==="
          python -c "
          import os, json, sys
          sys.path.insert(0, '${{ github.workspace }}')
          from proxy_parser import parse_proxy, build_singbox_config, get_proxy_protocol
          proxy = os.getenv('PROXY_NODE', '').strip()
          if not proxy:
              print('ERROR: PROXY_NODE empty'); sys.exit(1)
          proto = get_proxy_protocol(proxy)
          print(f'  protocol: {proto}')
          outbound = parse_proxy(proxy)
          print(f'  outbound type: {outbound[\"type\"]}')
          print(f'  server: {outbound.get(\"server\", \"?\")}:{outbound.get(\"server_port\", \"?\")}')
          cfg = build_singbox_config(outbound, socks_port=1080)
          with open('/tmp/sing-box/config.json', 'w') as f:
              json.dump(cfg, f, indent=2)
          print('  ✓ 配置已生成: /tmp/sing-box/config.json')
          "

          echo ""
          echo "=== 3. 启动 sing-box（后台） ==="
          nohup /tmp/sing-box/sing-box run -c /tmp/sing-box/config.json > /tmp/sing-box/singbox.log 2>&1 &
          SB_PID=$!
          echo $SB_PID > /tmp/sing-box/singbox.pid
          echo "✓ sing-box 已启动 (PID=$SB_PID)"
          sleep 3

          if kill -0 $SB_PID 2>/dev/null; then
            echo "✓ sing-box 进程存活"
          else
            echo "✗ sing-box 启动失败，日志:"
            cat /tmp/sing-box/singbox.log
            exit 1
          fi

          echo ""
          echo "=== 4. 验证代理出网 ==="
          if curl -fsSL --socks5 127.0.0.1:1080 --max-time 20 https://ipinfo.io/json; then
            echo ""
            echo "✓ 代理出网正常"
          else
            echo "✗ 代理出网失败"
            echo "--- singbox.log ---"
            cat /tmp/sing-box/singbox.log
            exit 1
          fi

      - name: ▶️ Run renew
        env:
          WEIRDH0ST_COOKIE_1: ${{ secrets.WEIRDH0ST_COOKIE_1 }}
          WEIRDH0ST_COOKIE_2: ${{ secrets.WEIRDH0ST_COOKIE_2 }}
          WEIRDH0ST_COOKIE_3: ${{ secrets.WEIRDH0ST_COOKIE_3 }}
          WEIRDH0ST_COOKIE_4: ${{ secrets.WEIRDH0ST_COOKIE_4 }}
          WEIRDH0ST_COOKIE_5: ${{ secrets.WEIRDH0ST_COOKIE_5 }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: python renew.py
        continue-on-error: true

      - name: 📤 Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weirdhost-debug-${{ github.run_id }}
          path: |
            /tmp/weirdhost_debug/
            /tmp/sing-box/singbox.log
          if-no-files-found: ignore
          retention-days: 7

      - name: 🧹 Cleanup sing-box
        if: always()
        run: |
          if [ -f /tmp/sing-box/singbox.pid ]; then
            PID=$(cat /tmp/sing-box/singbox.pid)
            kill $PID 2>/dev/null || true
            echo "sing-box (PID=$PID) 已停止"
          fi
