name: auto-renew

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: renew-${{ github.ref }}
  cancel-in-progress: false

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🌐 Install Playwright Chromium (with system deps)
        run: playwright install --with-deps chromium

      - name: 🔧 Setup Xray-core (if PROXY_NODE configured)
        if: env.PROXY_NODE != ''
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: |
          set -e
          echo "=== 1. 下载 Xray-core ==="
          XRAY_VERSION="v25.6.9"
          XRAY_URL="https://github.com/XTLS/Xray-core/releases/download/${XRAY_VERSION}/Xray-linux-64.zip"
          mkdir -p /tmp/xray
          curl -fsSL -o /tmp/xray.zip "$XRAY_URL"
          cd /tmp/xray && unzip -o /tmp/xray.zip
          chmod +x xray
          echo "✓ Xray 已下载: $(/tmp/xray/xray -version | head -1)"

          echo ""
          echo "=== 2. 生成 Xray 配置 ==="
          python -c "
          import os, json, sys
          sys.path.insert(0, '${{ github.workspace }}')
          from proxy_parser import parse_proxy, build_xray_config, get_proxy_protocol
          proxy = os.getenv('PROXY_NODE', '').strip()
          if not proxy:
              print('ERROR: PROXY_NODE empty'); sys.exit(1)
          proto = get_proxy_protocol(proxy)
          print(f'  protocol: {proto}')
          outbound = parse_proxy(proxy)
          print(f'  outbound protocol: {outbound[\"protocol\"]}')
          cfg = build_xray_config(outbound, socks_port=1080, http_port=1081)
          with open('/tmp/xray/config.json', 'w') as f:
              json.dump(cfg, f, indent=2)
          print('  ✓ 配置已生成')
          "

          echo ""
          echo "=== 3. 启动 Xray（后台） ==="
          nohup /tmp/xray/xray run -config /tmp/xray/config.json > /tmp/xray/xray.log 2>&1 &
          XRAY_PID=$!
          echo $XRAY_PID > /tmp/xray/xray.pid
          echo "✓ Xray 已启动 (PID=$XRAY_PID)"
          sleep 3

          if kill -0 $XRAY_PID 2>/dev/null; then
            echo "✓ Xray 进程存活"
          else
            echo "✗ Xray 启动失败，日志:"
            cat /tmp/xray/xray.log
            exit 1
          fi

          echo ""
          echo "=== 4. 验证代理出网 ==="
          # 测试 SOCKS5 端口
          if curl -fsSL --socks5 127.0.0.1:1080 --max-time 20 https://ipinfo.io/json; then
            echo ""
            echo "✓ 代理出网正常"
          else
            echo "✗ 代理出网失败"
            echo "--- xray.log ---"
            cat /tmp/xray/xray.log
            exit 1
          fi

      - name: ▶️ Run renew
        env:
          WEIRDH0ST_COOKIE_1: ${{ secrets.WEIRDH0ST_COOKIE_1 }}
          WEIRDH0ST_COOKIE_2: ${{ secrets.WEIRDH0ST_COOKIE_2 }}
          WEIRDH0ST_COOKIE_3: ${{ secrets.WEIRDH0ST_COOKIE_3 }}
          WEIRDH0ST_COOKIE_4: ${{ secrets.WEIRDH0ST_COOKIE_4 }}
          WEIRDH0ST_COOKIE_5: ${{ secrets.WEIRDH0ST_COOKIE_5 }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: python renew.py
        continue-on-error: true

      - name: 📤 Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weirdhost-debug-${{ github.run_id }}
          path: |
            /tmp/weirdhost_debug/
            /tmp/xray/xray.log
          if-no-files-found: ignore
          retention-days: 7

      - name: 🧹 Cleanup Xray
        if: always()
        run: |
          if [ -f /tmp/xray/xray.pid ]; then
            PID=$(cat /tmp/xray/xray.pid)
            kill $PID 2>/dev/null || true
            echo "Xray (PID=$PID) 已停止"
          fi
