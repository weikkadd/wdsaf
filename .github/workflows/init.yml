name: init-project

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: create files
        run: |
          mkdir -p .github/workflows

          cat > renew.py << 'EOF'
import os
import requests
from playwright.sync_api import sync_playwright

EMAIL = os.getenv("EMAIL")
PASSWORD = os.getenv("PASSWORD")
GT_URL = os.getenv("GT_URL")

BASE_URL = "https://hub.weirdhost.xyz"

def notify(t, c):
    if GT_URL:
        try:
            requests.post(GT_URL, json={"title": t, "content": c})
        except:
            pass

with sync_playwright() as p:
    browser = p.chromium.launch(headless=True, args=["--no-sandbox"])
    page = browser.new_page()

    page.goto(BASE_URL)

    if "just a moment" in page.content().lower():
        notify("CF拦截", "Cloudflare阻拦")
        browser.close()
        exit()

    try:
        page.fill('input[type="email"]', EMAIL)
        page.fill('input[type="password"]', PASSWORD)
        page.click('button[type="submit"]')
    except:
        notify("登录失败", "无法填写表单")
        browser.close()
        exit()

    page.wait_for_timeout(5000)
    page.goto(BASE_URL + "/dashboard")

    try:
        page.click("text=Renew")
        notify("续期成功", "OK")
    except Exception as e:
        notify("续期失败", str(e))

    browser.close()
EOF

          cat > requirements.txt << 'EOF'
playwright
requests
EOF

          cat > .github/workflows/renew.yml << 'EOF'
name: auto-renew

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt
      - run: playwright install chromium

      - run: python renew.py
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          GT_URL: ${{ secrets.GT_URL }}
EOF

      - name: commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "init project"
          git push
